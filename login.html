<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hidden {
            display: none;
        }
        .loginbox {
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>
<body class="container mt-4">

<div class="loginbox">

    <div id="loginPage">
        <h1>Login</h1>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="loginEmail" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="loginPassword" class="form-control">
        </div>

        <button id="loginBtn" class="btn btn-success w-100">Login</button>

        <p class="mt-3 text-center">
            New user?
            <a href="#" id="goSignupPage">Create account</a>
        </p>
    </div>

    <div id="signupPage" class="hidden">
        <h1>Create Account</h1>

        <label>Email</label>
        <input id="signupEmail" type="email" class="form-control mb-3" placeholder="Enter your email">

        <label>Password</label>
        <input id="signupPassword" type="password" class="form-control mb-3" placeholder="Create a password">

        <button id="signupBtn" class="btn btn-primary w-100">Sign Up</button>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="#" id="goLoginPage">Login</a>
        </p>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.5.0/firebase-app.js";
    import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/9.5.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAY5_gxRTNZLIGKYpuNqnFLmBA6iyQgkxg",
        authDomain: "shop-kart-32123.firebaseapp.com",
        projectId: "shop-kart-32123",
        storageBucket: "shop-kart-32123.appspot.com",
        messagingSenderId: "79140828776",
        appId: "1:79140828776:web:4719190b1e327fa7d9eddd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginPage = document.getElementById("loginPage");
    const signupPage = document.getElementById("signupPage");

    document.getElementById("goSignupPage").onclick = () => {
        loginPage.classList.add("hidden");
        signupPage.classList.remove("hidden");
    };

    document.getElementById("goLoginPage").onclick = () => {
        signupPage.classList.add("hidden");
        loginPage.classList.remove("hidden");
    };

    document.getElementById("loginBtn").onclick = () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPassword").value;

        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                alert("Login successful!");
                window.location.href = "mainpage.html";
            })
            .catch(err => alert(err.message));
    };

    document.getElementById("signupBtn").onclick = () => {
        const email = document.getElementById("signupEmail").value;
        const pass = document.getElementById("signupPassword").value;

        createUserWithEmailAndPassword(auth, email, pass)
            .then(() => {
                alert("Account created! Please login.");
                signupPage.classList.add("hidden");
                loginPage.classList.remove("hidden");
            })
            .catch(err => alert(err.message));
    };
</script>

</body>
</html>
